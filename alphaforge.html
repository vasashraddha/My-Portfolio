<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AlphaForge Dashboard | Shraddha Vasa</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

  <link rel="stylesheet" href="alphaforge-style.css" />
</head>
<body>

  <div class="dashboard">
    <div style="padding: 10px 0;"><a href="index.html" style="color: #8b90a4; text-decoration: none;">← Back to Home</a></div>

    <div class="header">
        <span class="logo-text">AlphaForge Optimizer</span>
        <span class="badge">Mean-Variance & Covariance Shrinkage</span>
    </div>

    <div class="metrics-grid">
      <div class="metric-card">
        <div class="label">Total Return</div>
        <div class="value">+549.9%</div>
      </div>
      <div class="metric-card">
        <div class="label">Sharpe Ratio</div>
        <div class="value">1.08</div>
      </div>
      <div class="metric-card">
        <div class="label">Daily VaR</div>
        <div class="value" style="color:#f05a5a">-3.00%</div>
      </div>
    </div>

    <div class="main-grid">
      <div class="card">
        <h3>Optimal Allocation</h3>
        <div id="allocList"></div>
        <div class="chart-container"><canvas id="donutChart"></canvas></div>
      </div>
      <div class="card">
        <h3>Correlation Matrix</h3>
        <div id="heatmap" class="heatmap-grid"></div>
      </div>
    </div>

    <div class="card">
      <h3>Returns Comparison</h3>
      <div class="chart-container" style="height:280px;">
        <canvas id="returnsChart"></canvas>
      </div>
    </div>
  </div>

  <script src="alphaforge-script.js"></script>
</body>
</html>
