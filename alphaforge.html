<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AlphaForge Optimizer | Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <link rel="stylesheet" href="alphaforge-style.css" />
</head>
<body>

  <div class="dashboard">
    <div class="nav-header"><a href="index.html">← Back to Portfolio</a></div>

    <div class="brand-strip">
        <span class="logo">AlphaForge Optimizer</span>
        <span class="status-tag">Optimal Frontier Found</span>
    </div>

    <div class="top-metrics">
      <div class="m-card">
        <span class="m-label">Expected Return</span>
        <span class="m-value">+549.9%</span>
      </div>
      <div class="m-card">
        <span class="m-label">Sharpe Ratio</span>
        <span class="m-value">1.08</span>
      </div>
      <div class="m-card">
        <span class="m-label">Volatility (Annual)</span>
        <span class="m-value" style="color:#f5a623">30.8%</span>
      </div>
    </div>

    <div class="grid-layout">
      <div class="card">
        <h3>Optimal Weights</h3>
        <div id="allocList" class="allocation-list"></div>
        <div class="chart-box"><canvas id="donutChart"></canvas></div>
      </div>

      <div class="card">
        <h3>Correlation Matrix</h3>
        <div id="heatmap" class="heatmap-container"></div>
      </div>
    </div>

    <div class="card">
      <h3>Returns Comparison (Cumulative %)</h3>
      <div class="chart-box" style="height: 300px;">
        <canvas id="returnsChart"></canvas>
      </div>
    </div>
  </div>

  <script src="alphaforge-script.js"></script>
</body>
</html>
